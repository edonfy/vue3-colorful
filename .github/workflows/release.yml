name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-latest-stable-assets:
    name: Sync latest stable release assets
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest stable release
        id: release
        run: |
          RELEASE_TAG=$(
            git tag --list 'v*' --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -n 1 \
              || true
          )

          if [ -z "$RELEASE_TAG" ]; then
            echo "No stable release tag found; skipping sync."
            echo "has_stable_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_SHA=$(git rev-list -n 1 "$RELEASE_TAG")
          git merge-base --is-ancestor "$RELEASE_SHA" "HEAD"

          echo "has_stable_release=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        if: steps.release.outputs.has_stable_release == 'true'
        run: |
          node ./scripts/extract-release-notes.mjs \
            --version "${{ steps.release.outputs.release_version }}" \
            --source CHANGELOG.md \
            --output RELEASE_NOTES.md

      - name: Create or update GitHub release
        if: steps.release.outputs.has_stable_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file RELEASE_NOTES.md
          fi

      - name: Dispatch example deployment workflow
        if: steps.release.outputs.has_stable_release == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          PAYLOAD=$(printf '{"ref":"%s","inputs":{"release_tag":"%s","release_sha":"%s"}}' \
            "$DEFAULT_BRANCH" \
            "$RELEASE_TAG" \
            "$RELEASE_SHA")

          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-example.yml/dispatches" \
            -d "$PAYLOAD"

  verify-tag:
    name: Verify tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tagged commit is on default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "$DEFAULT_BRANCH" --no-tags
          TAG_COMMIT=$(git rev-list -n 1 "$GITHUB_REF_NAME")
          git merge-base --is-ancestor "$TAG_COMMIT" "origin/$DEFAULT_BRANCH"

      - name: Type check
        run: pnpm type-check

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm exec eslint . --max-warnings 0

      - name: Run tests
        run: pnpm test:run

      - name: Check test coverage
        run: pnpm test:coverage

      - name: Build package
        run: pnpm build

      - name: Build example
        run: pnpm build:example

  publish-npm:
    name: Publish npm package
    needs: verify-tag
    if: needs.verify-tag.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Publish package when version is not on npm yet
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_VERSION: ${{ needs.verify-tag.outputs.package_version }}
        run: |
          set +e
          PROBE_OUTPUT=$(pnpm view "vue3-colorful@$PACKAGE_VERSION" version 2>&1)
          PROBE_STATUS=$?
          set -e

          if [ "$PROBE_STATUS" -eq 0 ]; then
            echo "Version $PACKAGE_VERSION is already published; skipping publish."
            exit 0
          fi

          if printf '%s' "$PROBE_OUTPUT" | grep -Eq 'E404|404 Not Found|No match found for version'; then
            echo "Version $PACKAGE_VERSION is not published yet; continuing to publish."
          else
            echo "$PROBE_OUTPUT" >&2
            echo "Failed to verify whether version $PACKAGE_VERSION exists on npm." >&2
            exit 1
          fi

          pnpm publish --no-git-checks

  dispatch-example-deploy:
    name: Dispatch example deploy
    needs: [verify-tag, publish-npm]
    if: needs.verify-tag.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Dispatch example deployment workflow
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PAYLOAD=$(printf '{"ref":"%s","inputs":{"release_tag":"%s","release_sha":"%s"}}' \
            "$DEFAULT_BRANCH" \
            "$GITHUB_REF_NAME" \
            "$GITHUB_SHA")

          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-example.yml/dispatches" \
            -d "$PAYLOAD"

  create-github-release:
    name: Create GitHub release
    needs: [verify-tag, publish-npm]
    if: needs.verify-tag.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "$DEFAULT_BRANCH" --depth=1 --no-tags
          git show "origin/$DEFAULT_BRANCH:CHANGELOG.md" > DEFAULT_BRANCH_CHANGELOG.md

          node ./scripts/extract-release-notes.mjs \
            --version "${GITHUB_REF_NAME#v}" \
            --source CHANGELOG.md \
            --fallback-source DEFAULT_BRANCH_CHANGELOG.md \
            --output RELEASE_NOTES.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md
          fi
