name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies

        run: pnpm install

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build

      - name: Check size baseline
        if: matrix.node-version == '20.x'
        run: pnpm size:check

      - name: Generate performance baseline report
        if: matrix.node-version == '20.x'
        run: pnpm perf:baseline

      - name: Upload size and performance reports
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: baselines-node-20
          path: |
            docs/size-baseline.md
            docs/perf-baseline.md

      - name: Append baseline summary
        if: matrix.node-version == '20.x'
        run: |
          echo "## Size Baseline" >> "$GITHUB_STEP_SUMMARY"
          cat docs/size-baseline.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Interaction Performance Baseline" >> "$GITHUB_STEP_SUMMARY"
          cat docs/perf-baseline.md >> "$GITHUB_STEP_SUMMARY"

      - name: Check test coverage
        run: pnpm test:coverage

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies

        run: pnpm install

      - name: Format check
        run: pnpm prettier --check src/

      - name: ESLint
        run: pnpm lint
